name: arr
services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=United States
      - TZ=America/New_York
    ports:
      - '8080:8080'
    networks:
      lan:
        ipv4_address: ${GLUETUN_PRIVATE_IP}
    restart: always
    cap_add:
      - NET_ADMIN
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    volumes:
      - /opt/docker/jellyseerr/config:/app/config
    environment:
      - TZ=America/New_York
    networks:
      lan:
        ipv4_address: ${JELLYSEERR_PRIVATE_IP}
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - /opt/docker/prowlarr/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    networks:
      lan:
        ipv4_address: ${PROWLARR_PRIVATE_IP}
    restart: unless-stopped
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - /opt/docker/radarr/config:/config
      - /cache/downloads/complete:/downloads
      - /srv/media/movies:/movies
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    networks:
      lan:
        ipv4_address: ${RADARR_PRIVATE_IP}
    restart: unless-stopped
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /opt/docker/sabnzbd/config:/config
      - /cache/downloads/complete:/downloads
      - /cache/downloads/incomplete:/incomplete-downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    network_mode: "service:gluetun"
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - /opt/docker/sonarr/config:/config
      - /cache/downloads/complete:/downloads
      - /srv/media/tv:/tv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    networks:
      lan:
        ipv4_address: ${SONARR_PRIVATE_IP}
    restart: unless-stopped
  
networks:
  lan:
    external: true