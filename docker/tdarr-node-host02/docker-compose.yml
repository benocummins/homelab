name: tdarr-node-host02
services:
  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node-host02
    volumes:
      - /opt/docker/tdarr-node/configs:/app/configs
      - /opt/docker/tdarr-node/logs:/app/logs
      - /mnt/fx_media:/media
      - /tmp/tdarr:/temp
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      - nodeID=${NODE_ID}
      - nodeIP=${NODE_PRIVATE_IP}
      - nodePort=8267
      - serverIP=${SERVER_PRIVATE_IP}
      - serverPort=8266
    ports:
      - '8267:8267'
    networks:
      lan:
        ipv4_address: ${NODE_PRIVATE_IP}
    restart: unless-stopped

networks:
  lan:
    external: true